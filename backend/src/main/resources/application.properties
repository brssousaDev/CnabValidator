spring.application.name=cnab-validador

# Porta preservada conforme ADR_1.0.md
server.port=9084
server.address=0.0.0.0

# Upload de arquivos CNAB (até 50 MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Swagger UI via SpringDoc
springdoc.swagger-ui.path=/swagger-ui

# CNAB — encoding ISO-8859-1 (mantido igual)
cnab.file.encoding=ISO-8859-1
